name: Postman Collection Workflow

on: 
  push:
    branches: [main]
  workflow_dispatch: 
  schedule:
    - cron: '30 02 16 6 *'
    - cron: '00 14 * * *'

jobs:
  run-postman-test:
    runs-on:
      - ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6.0.3

      - name: Install Node js and npm
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Install Newman and htmlextra globally
        run: | 
             npm install -g newman
             npm install -g newman-reporter-htmlextra

      - name: Run the postman collection using Newman
        run: | 
             newman run 'In-Warranty Flow Collection.postman_collection.json' \
             -e QA.postman_environment.json \
             -d testdata.csv \
             -r cli,htmlextra \
             --reporter-htmlextra-export ./newman/index.html
             
      - name: Newman report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Newman Report
          path: newman/*.html

      - name: Creating github page branch
        if: always()
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: newman/

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Phoenix InWarranty Flow Test Execution Notification
          to: satishmishra372@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
                Hi,
                Please find Pheonix Inwarranty Flow Test Execution Report.
                The Report has been published and the URL 
                is: https://satishcul6.github.io/Phoenix-Inwarranty-Flow/
          
          
          

            
      
          




